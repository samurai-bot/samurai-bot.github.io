name: Deploy chiamck.site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  verify:
    name: Verify résumé cipher
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - name: Decrypt and validate resume.enc.json against SIMPLE_AUTH secret
        env:
          SIMPLE_AUTH: ${{ secrets.SIMPLE_AUTH }}
        run: node scripts/verify-resume.mjs

  deploy:
    name: Build & deploy to Pages
    needs: verify
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Configure Pages
        uses: actions/configure-pages@v6
      - name: Upload artifact (whole repo)
        uses: actions/upload-pages-artifact@v5
        with:
          path: '.'
      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v5
